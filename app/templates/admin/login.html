{% extends "base.html" %}
{% block title %}管理员登录{% endblock %}
{% block head %}
    <style>
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }
        .main-container {
            position: relative;
            z-index: 1;
        }
        /* 管理员登录页面动画 */
        .auth-card {
            animation: bounceIn 0.8s ease-out forwards;
            background-color: rgba(255, 255, 255, 0.4) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-left: 4px solid #4169e1 !important;
            position: relative;
            overflow: hidden;
        }
        
        .auth-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-top: 80px solid rgba(65, 105, 225, 0.1);
            border-left: 80px solid transparent;
            transition: all 0.3s ease;
        }
        
        .auth-card:hover::after {
            width: 100%;
            height: 100%;
            border-top: none;
            border-left: none;
            background: linear-gradient(135deg, rgba(65, 105, 225, 0.1) 0%, rgba(65, 105, 225, 0) 100%);
        }
        
        .auth-card h1 {
            animation: fadeInUp 0.8s ease-out forwards 0.2s;
            opacity: 0;
            color: #4169e1 !important;
            background: linear-gradient(90deg, #4169e1, #1e40af) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
        }
        .form-label {
            color: #444 !important;
        }
        
        .form-group {
            animation: fadeInUp 0.8s ease-out forwards 0.4s;
            opacity: 0;
        }
        
        .form-group.mt-3 {
            animation-delay: 0.6s;
        }
        
        .btn-primary {
            animation: glow 2s infinite 1s;
        }
        .form-label {
            color: #333 !important;
        }
    </style>
{% endblock %}
{% block content %}
    <div class="video-container">
        <video autoplay muted loop>
            <source src="{{ url_for('static', filename='images/【哲风壁纸】光影-光斑-光束.mp4') }}" type="video/mp4">
            您的浏览器不支持视频播放
        </video>
    </div>
    <div class="card auth-card" style="max-width: 400px; margin: 2rem auto;">
        <div class="card-body">
            <h1 class="text-center mb-4">管理员登录</h1>
            <form method="POST" action="{{ url_for('admin.admin_login_post') }}">
                <div class="form-group">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="form-group mt-3">
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
