{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block head %}
<style>
    .video-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
    }
    .video-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.7);
    }
    .main-container {
        position: relative;
        z-index: 1;
    }
    .card {
        background-color: rgba(255, 255, 255, 0.4) !important;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-left: 4px solid #4169e1 !important;
        position: relative;
        overflow: hidden;
    }
    .card::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 0;
        height: 0;
        border-top: 80px solid rgba(65, 105, 225, 0.1);
        border-left: 80px solid transparent;
        transition: all 0.3s ease;
    }
    .card:hover::after {
        width: 100%;
        height: 100%;
        border-top: none;
        border-left: none;
        background: linear-gradient(135deg, rgba(65, 105, 225, 0.1) 0%, rgba(65, 105, 225, 0) 100%);
    }
    .card-title {
        color: #4169e1 !important;
        background: linear-gradient(90deg, #4169e1, #1e40af) !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        font-weight: bold;
    }
    .card-text {
        color: #444 !important;
        font-weight: 500;
    }
</style>
{% endblock %}
{% block content %}
    <div class="video-container">
        <video autoplay muted loop>
            <source src="{{ url_for('static', filename='images/ys-tt-xk.mp4') }}" type="video/mp4">
            您的浏览器不支持视频播放
        </video>
    </div>
    <h1 class="mb-4" style="color: #333;">关于博客</h1>
    <div class="card">
        <div class="card-body">
            <h2 class="card-title">关于我</h2>
            <p class="card-text">大家好，我是南北，这是我的个人博客。我喜欢分享技术、生活和思考，希望通过这个平台与大家交流和学习。</p>
            <h2 class="card-title mt-4">关于博客</h2>
            <p class="card-text">这个博客使用 Flask 框架搭建，包含前端和后端功能，支持用户注册、登录、发布文章和评论等功能。</p>
            <p class="card-text">博客的目标是成为一个分享知识和交流思想的平台，欢迎大家关注和参与。</p>
        </div>
    </div>
{% endblock %}
